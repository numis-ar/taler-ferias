# Taler Exchange Configuration for Local Deployment
# Uses Fakebank for wire transfers (testing/demo setup)

[taler]
CURRENCY = KUDOS
CURRENCY_ROUND_UNIT = KUDOS:0.01

[exchange]
# Base URL where the exchange is reachable
BASE_URL = https://EXCHANGE_HOST_PLACEHOLDER/exchange/

# Database configuration
DB = postgres

# Legal compliance settings
LOOKAHEAD_SIGN = 4 weeks
LOOKAHEAD_PROVIDE = 2 weeks

# Required option for tiny payments (dust amount threshold)
TINY_AMOUNT = KUDOS:0.01

# Master public key will be added by init script after key generation
# MASTER_PUBLIC_KEY = 

[exchangedb-postgres]
CONFIG = postgres://taler:talerpassword@postgres/taler_exchange
IDLE_RESERVE_EXPIRATION = 7 days

# Wire method configuration for Fakebank
[exchange-account-1]
# Account identifier in RFC-8905 payto:// format
PAYTO_URI = payto://x-taler-bank/localhost/exchange

# Wire gateway URL for the fakebank
WIRE_GATEWAY_URL = http://fakebank:8082/taler-wire-gateway/

# Use for outgoing transfers (paying merchants)
ENABLE_DEBIT = YES
# Use for incoming transfers (reserves from customers)
ENABLE_CREDIT = YES

[exchange-accountcredentials-1]
WIRE_GATEWAY_URL = http://fakebank:8082/taler-wire-gateway/
WIRE_GATEWAY_AUTH_METHOD = basic
USERNAME = exchange
PASSWORD = exchange_password

[fees-kudos]
# Wire fees (0 for testing)
WIRE = KUDOS:0

# Denomination (coin) settings for testing
# Format: [coin_CURRENCY_VALUE_REVISION]

[coin_KUDOS_0_01_0]
VALUE = KUDOS:0.01
DURATION_WITHDRAW = 7 days
DURATION_SPEND = 2 years
DURATION_LEGAL = 6 years
FEE_WITHDRAW = KUDOS:0
FEE_DEPOSIT = KUDOS:0
FEE_REFRESH = KUDOS:0
FEE_REFUND = KUDOS:0
CIPHER = RSA
RSA_KEYSIZE = 1024

