# Taler Exchange Configuration - Complete Local Setup
# Fully offline mock transactions

[taler]
CURRENCY = KUDOS

[exchange]
# Basic settings
BASE_URL = http://localhost:8081/

# Currency settings
CURRENCY_FRACTION_DIGITS = 2
CURRENCY_ROUND_UNIT = KUDOS:0.01
TINY_AMOUNT = KUDOS:0.01

# Master public key - will be auto-generated at startup
# This will be filled in by init-exchange.sh

# Disable KYC for testing
ENABLE_KYC = NO
DISABLE_DIRECT_DEPOSIT = NO

# Asset type
ASSET_TYPE = "fiat"

# Database
DB = postgres

# Network configuration
SERVE = tcp
PORT = 8081

# Legal directories
TERMS_DIR = /usr/share/taler-exchange/terms
PRIVACY_DIR = /usr/share/taler-exchange/privacy

# How long do we keep data
LEGAL_PRESERVATION = 11 years

[exchangedb-postgres]
CONFIG = postgres://taler:talerpassword@postgres:5432/taler_exchange

# Wire fees - zero for testing
[wire-fee]
WIRE_FEE_KUDOS = KUDOS:0
CLOSING_FEE_KUDOS = KUDOS:0

# All transaction fees - zero for testing
[fee-deposit]
ZERO = KUDOS:0

[fee-refresh]
ZERO = KUDOS:0

[fee-refund]
ZERO = KUDOS:0

[fee-withdraw]
ZERO = KUDOS:0

# Coin denominations for KUDOS
# Small denominations for testing
[exchangedb-coins-KUDOS-0-01]
VALUE = KUDOS:0.01
DURATION_WITHDRAW = 7 days
FEE_WITHDRAW = KUDOS:0
FEE_DEPOSIT = KUDOS:0
FEE_REFRESH = KUDOS:0
RSA_KEYSIZE = 1024

[exchangedb-coins-KUDOS-0-10]
VALUE = KUDOS:0.10
