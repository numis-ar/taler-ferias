# Taler Merchant Backend Configuration - Local Testing Setup
# Uses local exchange with fake bank

[taler]
CURRENCY = KUDOS
BASE_URL = http://taler-merchant:9966/

[merchant]
# Service configuration
SERVE = tcp
PORT = 9966
DATABASE = postgres

[merchantdb-postgres]
# PostgreSQL database configuration
CONFIG = postgres://taler:talerpassword@postgres:5432/taler_merchant

# Disable default exchanges that require KYC
[merchant-exchange-chf]
DISABLED = YES

[merchant-exchange-kudos]
DISABLED = YES

[merchant-exchange-local]
# Configuration for the LOCAL KUDOS exchange only
EXCHANGE_BASE_URL = http://taler-exchange:8081/
CURRENCY = KUDOS
MASTER_KEY = F80MFRG8HVH6R9CQ47KRFQSJP3T6DBJ4K1D9B703RJY3Z39TBMJ0

