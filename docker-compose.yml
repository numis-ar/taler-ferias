services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: taler
      POSTGRES_PASSWORD: talerpassword
      POSTGRES_DB: taler
    volumes:
      - /dev/null:/etc/hosts:ro
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taler"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taler-network

  # Libeufin Bank - Simulated bank with real authentication
  libeufin-bank:
    build:
      context: .
      dockerfile: Dockerfile.libeufin
    # Ports defined in docker-compose.override.yml
    environment:
      - LIBEUFIN_BANK_ADMIN_PASSWORD=asdasdasd
      - LIBEUFIN_BANK_CURRENCY=KUDOS
      - LIBEUFIN_BANK_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /dev/null:/etc/hosts:ro
      - ./bank.conf:/etc/libeufin/bank.conf:ro
      - ./libeufin-start.sh:/usr/local/bin/libeufin-start.sh:ro
    networks:
      - taler-network
    ports:
      - 8080:8080

  taler-exchange:
    build:
      context: .
      dockerfile: Dockerfile.exchange
    depends_on:
      postgres:
        condition: service_healthy
      libeufin-bank:
        condition: service_started
    # Ports defined in docker-compose.override.yml
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - DB_PASSWORD=talerpassword
      - FULL_DOMAIN=${FULL_DOMAIN}
      - USER=root
    volumes:
      - ./offline-keys.bkp/data:/root/.local/share/taler-exchange/
      - /dev/null:/etc/hosts:ro
      - ./exchange.conf:/etc/taler/taler.conf:ro
      - ./init-exchange.sh:/usr/local/bin/init-exchange.sh:ro
      - exchange_data:/var/lib/taler-exchange
    networks:
      - taler-network
    ports:
      - 8081:8081

  taler-merchant:
    build:
      context: .
      dockerfile: Dockerfile.merchant
    depends_on:
      postgres:
        condition: service_healthy
      taler-exchange:
        condition: service_started
      libeufin-bank:
        condition: service_started
    # Ports defined in docker-compose.override.yml
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - EXCHANGE_URL=http://taler-exchange:8081
    volumes:
      - /dev/null:/etc/hosts:ro
      - ./merchant.conf:/etc/taler/taler.conf:ro
      - merchant_data:/var/lib/taler-merchant
      - ./init-merchant.sh:/tmp/init-merchant.sh:ro
    command:
      - /bin/bash
      - -c
      - |
        echo '=== Setting up Taler Merchant Backend ==='
        
        until pg_isready -h postgres -U taler; do
          echo 'Waiting for PostgreSQL...'
          sleep 2
        done
        
        # Ensure merchant database exists
        if ! PGPASSWORD=talerpassword psql -h postgres -U taler -tc "SELECT 1 FROM pg_database WHERE datname = 'taler_merchant'" | grep -q 1; then
          echo 'Creating taler_merchant database...'
          PGPASSWORD=talerpassword psql -h postgres -U taler -c "CREATE DATABASE taler_merchant;"
        fi
        
        # Initialize database schema
        echo 'Initializing merchant database schema...'
        MAX_TRIES=5
        TRY=0
        while [ $$TRY -lt $$MAX_TRIES ]; do
          if taler-merchant-dbinit -c /etc/taler/taler.conf 2>&1; then
            echo 'Database initialized successfully'
            break
          fi
          TRY=$$((TRY + 1))
          echo "DB init attempt $$TRY/$$MAX_TRIES failed, retrying..."
          sleep 3
        done
        
        # Verify schema exists
        SCHEMA_EXISTS=$$(PGPASSWORD=talerpassword psql -h postgres -U taler -d taler_merchant -tc "SELECT 1 FROM information_schema.schemata WHERE schema_name = 'merchant'" 2>/dev/null | grep -c 1 || echo 0)
        if [ "$$SCHEMA_EXISTS" = "0" ]; then
          echo 'ERROR: Failed to initialize merchant schema'
          echo 'Checking database state...'
          PGPASSWORD=talerpassword psql -h postgres -U taler -d taler_merchant -c "\dt" 2>&1 || true
          echo 'Trying one more time...'
          taler-merchant-dbinit -c /etc/taler/taler.conf --force 2>&1 || true
        fi
        
        # Create admin instance
        echo 'Creating/Updating admin instance...'
        TALER_MERCHANT_PASSWORD=asdasdasd taler-merchant-passwd \
          -c /etc/taler/taler.conf \
          --instance=admin 2>&1 || {
            echo 'INFO: taler-merchant-passwd returned non-zero (may be OK if admin exists)'
          }
        
        # Wait for exchange to be ready
        echo 'Waiting for exchange to be ready...'
        for i in {1..60}; do
          if curl -sf http://taler-exchange:8081/keys >/dev/null 2>&1; then
            echo 'Exchange is ready'
            break
          fi
          echo "Waiting for exchange... ($$i/60)"
          sleep 2
        done
        
        # Run merchant initialization
        echo 'Running merchant initialization...'
        bash /tmp/init-merchant.sh || echo 'Merchant init completed with warnings'
        
        echo '=== Starting Merchant Services ==='
        taler-merchant-wirewatch -c /tmp/taler.conf -l wirewatch.log -L DEBUG &
        taler-merchant-depositcheck -c /tmp/taler.conf -l depositcheck.log -L DEBUG  &
        taler-merchant-exchangekeyupdate -c /tmp/taler.conf -l exchangekeyupdate.log -L DEBUG &
        taler-merchant-kyccheck -c /tmp/taler.conf -l kyccheck.log -L DEBUG &
        taler-merchant-reconciliation -c /tmp/taler.conf -l reconciliation.log -L DEBUG &
        taler-merchant-webhook -c /tmp/taler.conf -l webhook.log -L DEBUG &
        
        echo '=== Starting Merchant HTTP Daemon ==='
        echo 'Merchant Web UI: http://taler-merchant:9966/webui/'
        echo 'Login: admin / asdasdasd'
        exec taler-merchant-httpd -c /tmp/taler.conf
    networks:
      - taler-network
    ports:
      - 9966:9966

  demo-frontend:
    image: nginx:alpine
    # Ports defined in docker-compose.override.yml
    volumes:
      - /dev/null:/etc/hosts:ro
      - ./demo-frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - taler-network
    depends_on:
      - taler-merchant
    ports:
      - 80:80

volumes:
  postgres_data:
  merchant_data:
  exchange_data:

networks:
  taler-network:
    driver: bridge
