services:
  postgres:
    image: postgres:15
    container_name: taler-postgres
    environment:
      POSTGRES_USER: taler
      POSTGRES_PASSWORD: talerpassword
      POSTGRES_DB: taler
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taler"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taler-network

  # Taler Fakebank - Simple bank simulator for testing
  fakebank:
    build:
      context: .
      dockerfile: Dockerfile.fakebank
    container_name: taler-fakebank
    ports:
      - "8082"
    environment:
      - BANK_PORT=8082
      - BANK_CURRENCY=KUDOS
      - BANK_EXCHANGE_ACCOUNT=exchange
      - BANK_EXCHANGE_PASSWORD=exchange_password
    volumes:
      - ./fake-bank.py:/app/fake-bank.py:ro
    command: python3 /app/fake-bank.py
    networks:
      - taler-network

  taler-exchange:
    build:
      context: .
      dockerfile: Dockerfile.exchange
    container_name: taler-exchange
    depends_on:
      postgres:
        condition: service_healthy
      fakebank:
        condition: service_started
    ports:
      - "8081"
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - DB_PASSWORD=talerpassword
    volumes:
      - ./exchange-local.conf:/etc/taler/taler.conf:ro
      - exchange_data:/var/lib/taler-exchange
      - ./init-exchange.sh:/tmp/init-exchange.sh:ro
    command:
      - /bin/bash
      - -c
      - |
        echo '=== Setting up Taler Exchange ==='
        
        # Replace placeholder in config with actual domain from env
        if [ -n "$$FULL_DOMAIN" ]; then
          sed -i "s|EXCHANGE_HOST_PLACEHOLDER|$$FULL_DOMAIN|g" /etc/taler/taler.conf
          echo "Configured for domain: $$FULL_DOMAIN"
        fi
        
        until pg_isready -h postgres -U taler; do
          echo 'Waiting for PostgreSQL...'
          sleep 2
        done
        
        # Ensure exchange database exists
        PGPASSWORD=talerpassword psql -h postgres -U taler -tc "SELECT 1 FROM pg_database WHERE datname = 'taler_exchange'" | grep -q 1 || 
          PGPASSWORD=talerpassword psql -h postgres -U taler -c "CREATE DATABASE taler_exchange;"
        
        echo 'Initializing exchange database...'
        taler-exchange-dbinit -c /etc/taler/taler.conf 2>&1 || true
        
        # Wait for fakebank to be ready
        echo 'Waiting for fakebank...'
        for i in {1..30}; do
          if curl -sf http://fakebank:8082/healthz >/dev/null 2>&1 || \
             curl -sf http://fakebank:8082/accounts >/dev/null 2>&1; then
            echo 'Fakebank is ready'
            break
          fi
          echo "Waiting for fakebank... ($$i/30)"
          sleep 2
        done
        
        # Generate master key if not exists
        if [ ! -f /var/lib/taler-exchange/master.priv ]; then
          echo 'Generating exchange master key...'
          taler-exchange-offline -c /etc/taler/taler.conf generate-key 2>&1 || echo 'Key may already exist'
        fi
        
        # Generate denomination keys
        echo 'Generating denomination keys...'
        taler-exchange-offline -c /etc/taler/taler.conf wire-fees 2024 KUDOS 0 0 0 2>&1 || true
        taler-exchange-offline -c /etc/taler/taler.conf future-denominations 2>&1 || true
        taler-exchange-offline -c /etc/taler/taler.conf sign 2>&1 || echo 'Signing may need restart'
        
        # Show master key
        echo ''
        echo 'Exchange Master Public Key:'
        taler-exchange-keyup -c /etc/taler/taler.conf 2>/dev/null || echo '(will be available after startup)'
        
        echo '=== Starting Exchange Services ==='
        taler-exchange-wirewatch -c /etc/taler/taler.conf &
        taler-exchange-closer -c /etc/taler/taler.conf &
        taler-exchange-aggregator -c /etc/taler/taler.conf &
        taler-exchange-transfer -c /etc/taler/taler.conf &
        
        echo '=== Starting Exchange HTTPD ==='
        exec taler-exchange-httpd -c /etc/taler/taler.conf
    networks:
      - taler-network

  taler-merchant:
    build:
      context: .
      dockerfile: Dockerfile.merchant
    container_name: taler-merchant
    depends_on:
      postgres:
        condition: service_healthy
      taler-exchange:
        condition: service_started
      fakebank:
        condition: service_started
    ports:
      - "9966"
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - EXCHANGE_URL=http://taler-exchange:8081
    volumes:
      - ./merchant-demo.conf:/etc/taler/taler.conf:ro
      - merchant_data:/var/lib/taler-merchant
      - ./init-merchant.sh:/tmp/init-merchant.sh:ro
    command:
      - /bin/bash
      - -c
      - |
        echo '=== Setting up Taler Merchant Backend ==='
        
        until pg_isready -h postgres -U taler; do
          echo 'Waiting for PostgreSQL...'
          sleep 2
        done
        
        # Ensure merchant database exists
        PGPASSWORD=talerpassword psql -h postgres -U taler -tc "SELECT 1 FROM pg_database WHERE datname = 'taler_merchant'" | grep -q 1 || 
          PGPASSWORD=talerpassword psql -h postgres -U taler -c "CREATE DATABASE taler_merchant;"
        
        echo 'Initializing merchant database...'
        taler-merchant-dbinit -c /etc/taler/taler.conf 2>&1 || true
        
        echo 'Creating/Updating admin instance...'
        TALER_MERCHANT_PASSWORD=adminpassword taler-merchant-passwd \
          -c /etc/taler/taler.conf \
          --instance=admin 2>&1 || {
            echo 'INFO: taler-merchant-passwd returned non-zero (may be OK if admin exists)'
          }
        
        # Wait for exchange to be ready
        echo 'Waiting for exchange to be ready...'
        for i in {1..60}; do
          if curl -sf http://taler-exchange:8081/keys >/dev/null 2>&1; then
            echo 'Exchange is ready'
            break
          fi
          echo "Waiting for exchange... ($$i/60)"
          sleep 2
        done
        
        # Run merchant initialization (configure local exchange)
        echo 'Running merchant initialization...'
        bash /tmp/init-merchant.sh || echo 'Merchant init completed with warnings'
        
        echo '=== Starting Merchant Services ==='
        taler-merchant-wirewatch -c /etc/taler/taler.conf &
        taler-merchant-depositcheck -c /etc/taler/taler.conf &
        taler-merchant-exchangekeyupdate -c /etc/taler/taler.conf &
        
        echo '=== Starting Merchant HTTP Daemon ==='
        echo 'Merchant Web UI: http://localhost:9966/webui/'
        echo 'Login: admin / adminpassword'
        exec taler-merchant-httpd -c /etc/taler/taler.conf
    networks:
      - taler-network

  demo-frontend:
    image: nginx:alpine
    container_name: taler-demo-frontend
    ports:
      - "80"
    volumes:
      - ./demo-frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - taler-network
    depends_on:
      - taler-merchant

volumes:
  postgres_data:
  merchant_data:
  exchange_data:

networks:
  taler-network:
    driver: bridge
