services:
  postgres:
    image: postgres:15
    container_name: taler-postgres
    environment:
      POSTGRES_USER: taler
      POSTGRES_PASSWORD: talerpassword
      POSTGRES_DB: taler
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taler"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taler-network

  # Libeufin Sandbox - Simulated bank with real authentication
  libeufin-sandbox:
    image: registry.gitlab.com/libeufin/libeufin-sandbox:latest
    container_name: taler-sandbox
    ports:
      - "8082"
    environment:
      - LIBEUFIN_SANDBOX_ADMIN_PASSWORD=sandboxadmin
      - LIBEUFIN_SANDBOX_CURRENCY=KUDOS
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - taler-network
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        sleep 5 &&
        libeufin-sandbox serve --port 8082
      "

  taler-exchange:
    build:
      context: .
      dockerfile: Dockerfile.exchange
    container_name: taler-exchange
    depends_on:
      postgres:
        condition: service_healthy
      libeufin-sandbox:
        condition: service_started
    ports:
      - "8081"
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - DB_PASSWORD=talerpassword
      - FULL_DOMAIN=${FULL_DOMAIN}
    volumes:
      - ./exchange-local.conf:/etc/taler/taler.conf:ro
      - exchange_data:/var/lib/taler-exchange
    networks:
      - taler-network

  taler-merchant:
    build:
      context: .
      dockerfile: Dockerfile.merchant
    container_name: taler-merchant
    depends_on:
      postgres:
        condition: service_healthy
      taler-exchange:
        condition: service_started
      libeufin-sandbox:
        condition: service_started
    ports:
      - "9966"
    environment:
      - TALER_CONFIG=/etc/taler/taler.conf
      - EXCHANGE_URL=http://taler-exchange:8081
    volumes:
      - ./merchant-demo.conf:/etc/taler/taler.conf:ro
      - merchant_data:/var/lib/taler-merchant
      - ./init-merchant.sh:/tmp/init-merchant.sh:ro
    command:
      - /bin/bash
      - -c
      - |
        echo '=== Setting up Taler Merchant Backend ==='
        
        until pg_isready -h postgres -U taler; do
          echo 'Waiting for PostgreSQL...'
          sleep 2
        done
        
        # Ensure merchant database exists
        if ! PGPASSWORD=talerpassword psql -h postgres -U taler -tc "SELECT 1 FROM pg_database WHERE datname = 'taler_merchant'" | grep -q 1; then
          echo 'Creating taler_merchant database...'
          PGPASSWORD=talerpassword psql -h postgres -U taler -c "CREATE DATABASE taler_merchant;"
        fi
        
        # Initialize database schema
        echo 'Initializing merchant database schema...'
        MAX_TRIES=5
        TRY=0
        while [ $$TRY -lt $$MAX_TRIES ]; do
          if taler-merchant-dbinit -c /etc/taler/taler.conf 2>&1; then
            echo 'Database initialized successfully'
            break
          fi
          TRY=$$((TRY + 1))
          echo "DB init attempt $$TRY/$$MAX_TRIES failed, retrying..."
          sleep 3
        done
        
        # Verify schema exists
        SCHEMA_EXISTS=$$(PGPASSWORD=talerpassword psql -h postgres -U taler -d taler_merchant -tc "SELECT 1 FROM information_schema.schemata WHERE schema_name = 'merchant'" 2>/dev/null | grep -c 1 || echo 0)
        if [ "$$SCHEMA_EXISTS" = "0" ]; then
          echo 'ERROR: Failed to initialize merchant schema'
          echo 'Checking database state...'
          PGPASSWORD=talerpassword psql -h postgres -U taler -d taler_merchant -c "\dt" 2>&1 || true
          echo 'Trying one more time...'
          taler-merchant-dbinit -c /etc/taler/taler.conf --force 2>&1 || true
        fi
        
        # Create admin instance
        echo 'Creating/Updating admin instance...'
        TALER_MERCHANT_PASSWORD=adminpassword taler-merchant-passwd \
          -c /etc/taler/taler.conf \
          --instance=admin 2>&1 || {
            echo 'INFO: taler-merchant-passwd returned non-zero (may be OK if admin exists)'
          }
        
        # Wait for exchange to be ready
        echo 'Waiting for exchange to be ready...'
        for i in {1..60}; do
          if curl -sf http://taler-exchange:8081/keys >/dev/null 2>&1; then
            echo 'Exchange is ready'
            break
          fi
          echo "Waiting for exchange... ($$i/60)"
          sleep 2
        done
        
        # Run merchant initialization
        echo 'Running merchant initialization...'
        bash /tmp/init-merchant.sh || echo 'Merchant init completed with warnings'
        
        echo '=== Starting Merchant Services ==='
        taler-merchant-wirewatch -c /etc/taler/taler.conf &
        taler-merchant-depositcheck -c /etc/taler/taler.conf &
        taler-merchant-exchangekeyupdate -c /etc/taler/taler.conf &
        
        echo '=== Starting Merchant HTTP Daemon ==='
        echo 'Merchant Web UI: http://localhost:9966/webui/'
        echo 'Login: admin / adminpassword'
        exec taler-merchant-httpd -c /etc/taler/taler.conf
    networks:
      - taler-network

  demo-frontend:
    image: nginx:alpine
    container_name: taler-demo-frontend
    ports:
      - "80"
    volumes:
      - ./demo-frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - taler-network
    depends_on:
      - taler-merchant

volumes:
  postgres_data:
  merchant_data:
  exchange_data:

networks:
  taler-network:
    driver: bridge
